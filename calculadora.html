<head>
    <title>Calculadora</title>
</head>
<body>
<div id="calculadora">
    <h2>Calculadora</h2>

    <imput type="number" id="num1" placeholder="Número 1">
    <imput type="number" id="num2" placeholder="Número 2">
        
        <div id="botoes">
                 <button id="somar">+</button>
                 <button id="subtrair">−</button>
                 <button id="multiplicar">×</button>
                 <button id="dividir">÷</button>
        </div>
        <p id="resultado"></p>
        </div>
      <script src="calculadora.js"></script>
</body>
